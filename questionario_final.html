<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RLI Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0ebe3;--card:#faf8f4;--ink:#1c1714;--muted:#7a6e65;--accent:#bf4a2b;--pale:#f7ede8;--border:#e0d8ce;--radius:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px 12px 40px;}
.shell{width:100%;max-width:420px;}
.prog-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;}
.card{background:var(--card);border-radius:var(--radius);padding:28px 24px 32px;box-shadow:0 4px 32px rgba(28,23,20,.09),0 1px 4px rgba(28,23,20,.05);}
.slide-in{animation:sIn .28s cubic-bezier(.4,0,.2,1);}
.slide-out{animation:sOut .18s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes sIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes sOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}
.chip{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--pale);border-radius:20px;padding:4px 10px;margin-bottom:14px;}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.65rem;color:var(--ink);line-height:1.18;margin-bottom:8px;}
.sub{font-size:.875rem;color:var(--muted);line-height:1.55;margin-bottom:24px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lang-btn{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid var(--border);border-radius:14px;background:white;cursor:pointer;transition:all .15s;text-align:left;width:100%;}
.lang-btn:active,.lang-btn:hover{border-color:var(--accent);background:var(--pale);}
.flag{font-size:1.4rem;line-height:1;}
.lang-text{display:flex;flex-direction:column;}
.lang-name{font-weight:600;font-size:.875rem;color:var(--ink);}
.lang-sub{font-size:.72rem;color:var(--muted);}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.role-card{border:1.5px solid var(--border);border-radius:16px;padding:22px 14px 18px;text-align:center;cursor:pointer;transition:all .18s;background:white;}
.role-card:active,.role-card:hover{border-color:var(--accent);background:var(--pale);transform:translateY(-2px);}
.role-icon{font-size:2.2rem;margin-bottom:10px;}
.role-name{font-weight:600;font-size:.9rem;color:var(--ink);margin-bottom:4px;}
.role-desc{font-size:.75rem;color:var(--muted);line-height:1.4;}
.field+.field{margin-top:16px;}
.field-label{font-size:.75rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block;}
input[type=text],input[type=number]{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);background:white;-webkit-appearance:none;transition:border-color .15s;}
input:focus{outline:none;border-color:#2a5fa8;}
.q-label{font-size:1.05rem;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:8px;}
.q-hint{font-size:.8rem;color:var(--muted);margin-bottom:18px;line-height:1.45;font-style:italic;}
textarea{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);background:white;resize:none;min-height:110px;line-height:1.55;transition:border-color .15s;}
textarea:focus{outline:none;border-color:#2a5fa8;}
.choices{display:flex;flex-direction:column;gap:9px;}
.choice{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);text-align:left;transition:all .14s;width:100%;line-height:1.4;}
.choice:active,.choice:hover{border-color:var(--accent);background:var(--pale);}
.choice.sel{border-color:var(--accent);background:var(--pale);color:var(--accent);font-weight:500;}
.dot{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;transition:all .14s;}
.choice.sel .dot{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px white;}
.yesno{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.yn{padding:16px;border:1.5px solid var(--border);border-radius:14px;background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;color:var(--muted);text-align:center;transition:all .14s;}
.yn:active,.yn:hover{border-color:var(--accent);background:var(--pale);}
.yn.sel{border-color:var(--accent);background:var(--pale);color:var(--accent);}
.followup{margin-top:14px;display:none;}
.followup.show{display:block;}
.fu-label{font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase;}
.nav{display:flex;gap:10px;margin-top:28px;}
.btn-back{padding:13px 18px;border:1.5px solid var(--border);border-radius:12px;background:white;font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--muted);cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn-back:hover{color:var(--ink);border-color:var(--ink);}
.btn-next{flex:1;padding:14px;border:none;border-radius:12px;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .18s;}
.btn-next:hover{background:#a03820;}
.btn-next:active{transform:scale(.98);}
.ty{text-align:center;padding:12px 0 8px;}
.ty-icon{font-size:3rem;margin-bottom:18px;display:block;}
.ty h2{font-family:'Fraunces',serif;font-size:1.6rem;color:var(--ink);margin-bottom:10px;}
.ty p{font-size:.9rem;color:var(--muted);line-height:1.6;}
@media(max-width:360px){.card{padding:22px 18px 26px;}h1{font-size:1.45rem;}}
</style>
</head>

const card=document.getElementById("card"),pf=document.getElementById("pf");
function isRTL(l){return l==="ar"||l==="ur";}
function setDir(l){document.body.dir=isRTL(l)?"rtl":"ltr";}
function prog(p){pf.style.width=p+"%";}
function render(html,p){
  card.classList.remove("slide-in");card.classList.add("slide-out");
  setTimeout(()=>{card.innerHTML=html;card.classList.remove("slide-out");card.classList.add("slide-in");setDir(lang);},170);
  prog(p);
}

function showLang(){
  const btns=LANGS.map(l=>`<button class="lang-btn" onclick="pickLang('${l.code}')"><span class="flag">${l.flag}</span><span class="lang-text"><span class="lang-name">${l.name}</span><span class="lang-sub">${l.sub}</span></span></button>`).join("");
  render(`<div class="chip">Welcome</div><h1>RLI Survey</h1><p class="sub">Select language / Scegli la lingua</p><div class="lang-grid">${btns}</div>`,4);
}
function pickLang(l){lang=l;showRole();}

function showRole(){
  const t=T[lang];
  render(`<div class="chip">1 / 3</div><h1>${t.role_title}</h1><p class="sub">&nbsp;</p><div class="role-grid"><div class="role-card" onclick="pickRole('tenant')"><div class="role-icon">🏠</div><div class="role-name">${t.role_t}</div><div class="role-desc">${t.role_t_desc}</div></div><div class="role-card" onclick="pickRole('landlord')"><div class="role-icon">🔑</div><div class="role-name">${t.role_l}</div><div class="role-desc">${t.role_l_desc}</div></div></div><div class="nav"><button class="btn-back" onclick="showLang()">←</button></div>`,14);
}
function pickRole(r){role=r;showDemo();}

function showDemo(){
  const t=T[lang];
  render(`<div class="chip">2 / 3</div><h1>${t.demo_title}</h1><p class="sub">${t.demo_sub}</p><div class="field"><label class="field-label">${t.f_age}</label><input type="number" min="16" max="99" placeholder="${t.ph_age}" value="${age}" oninput="age=this.value"></div><div class="field"><label class="field-label">${t.f_nat}</label><input type="text" placeholder="${t.ph_nat}" value="${nationality}" oninput="nationality=this.value"></div><div class="nav"><button class="btn-back" onclick="showRole()">${t.back}</button><button class="btn-next" onclick="startQ()">${t.next}</button></div>`,24);
}

function getQs(){return role==="tenant"?T[lang].tqs:T[lang].lqs;}
function startQ(){qIdx=0;showQ();}

function showQ(){
  const qs=getQs(),t=T[lang];
  if(qIdx>=qs.length){submitAnswers();return;}
  const q=qs[qIdx],total=qs.length,isLast=qIdx===total-1;
  const p=24+((qIdx+1)/total)*72;
  let body="";

  if(q.type==="open"){
    body=`${q.hint?`<p class="q-hint">${q.hint}</p>`:""}<textarea id="ta" placeholder="...">${answers[q.id]||""}</textarea>`;
  } else if(q.type==="yesno"){
    const cur=answers[q.id]||"";
    body=`<div class="yesno"><button class="yn${cur==="yes"?" sel":""}" onclick="setYN('${q.id}','yes',this)">✓ ${t.yes}</button><button class="yn${cur==="no"?" sel":""}" onclick="setYN('${q.id}','no',this)">✗ ${t.no}</button></div>${q.follow?`<div class="followup${cur?" show":""}" id="fu"><p class="fu-label" style="margin-top:14px">${t.why_label}</p><textarea id="fu_ta" placeholder="...">${answers[q.id+"_why"]||""}</textarea></div>`:""}`;
  } else if(q.type==="choice"){
    const cur=answers[q.id]||"";
    body=`<div class="choices">${q.opts.map(o=>`<button class="choice${cur===o?" sel":""}" onclick="setChoice('${q.id}','${o.replace(/\\/g,"\\\\").replace(/'/g,"\\'")}',this)"><span class="dot"></span>${o}</button>`).join("")}</div>${q.follow_open?`<div class="followup${cur?" show":""}" id="fu" style="margin-top:14px"><p class="fu-label">${t.why_label}</p><textarea id="fu_ta" placeholder="...">${answers[q.id+"_why"]||""}</textarea></div>`:""}`;
  }

  render(`<div class="chip">${qIdx+1} / ${total}</div><p class="q-label">${q.q}</p>${body}<div class="nav"><button class="btn-back" onclick="goBack()">${t.back}</button><button class="btn-next" onclick="goNext()">${isLast?t.submit:t.next}</button></div>`,p);
}

function setYN(id,val,el){
  answers[id]=val;
  document.querySelectorAll(".yn").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
  const fu=document.getElementById("fu");
  if(fu)fu.classList.add("show");
}
function setChoice(id,val,el){
  answers[id]=val;
  document.querySelectorAll(".choice").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
  const fu=document.getElementById("fu");
  if(fu)fu.classList.add("show");
}
function goNext(){
  const qs=getQs(),q=qs[qIdx],t=T[lang];
  const ta=document.getElementById("ta");
  if(ta)answers[q.id]=ta.value;
  const futa=document.getElementById("fu_ta");
  if(futa)answers[q.id+"_why"]=futa.value;
  if(q.type==="open"&&!answers[q.id]?.trim()){alert(t.req);return;}
  if((q.type==="yesno"||q.type==="choice")&&!answers[q.id]){alert(t.req);return;}
  qIdx++;showQ();
}
function goBack(){if(qIdx===0){showDemo();return;}qIdx--;showQ();}

function submitAnswers(){
  const payload={timestamp:new Date().toISOString(),lang,role,age,nationality,...answers};
  // Use no-cors to avoid CORS block — Apps Script accepts this
  fetch(SHEET_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify(payload)
  }).catch(()=>{});
  const t=T[lang];
  render(`<div class="ty"><span class="ty-icon">✅</span><h2>${t.ty_title}</h2><p>${t.ty_msg}</p></div>`,100);
}

showLang();
</script>
</body>
